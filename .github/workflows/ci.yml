name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Test (race)
        run: go test -race -count=1 ./...

      - name: Build all binaries
        run: |
          mkdir -p bin
          go build -trimpath -ldflags "-s -w" -o bin/collector ./cmd/collector
          go build -trimpath -ldflags "-s -w" -o bin/anchor    ./cmd/anchor
          go build -trimpath -ldflags "-s -w" -o bin/api       ./cmd/api
          go build -trimpath -ldflags "-s -w" -o bin/verify    ./cmd/verify

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.60
          args: --timeout=5m

  docker:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build api image
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: |
            TARGET=api
            VERSION=${{ github.sha }}
          push: false
          tags: fepublica:api-ci

      - name: Build collector image
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: |
            TARGET=collector
            VERSION=${{ github.sha }}
          push: false
          tags: fepublica:collector-ci

      - name: Build anchor image
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: |
            TARGET=anchor
            VERSION=${{ github.sha }}
          push: false
          tags: fepublica:anchor-ci
