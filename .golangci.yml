run:
  timeout: 5m
  tests: true
  go: "1.23"

output:
  formats:
    - format: colored-line-number

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - bodyclose

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
    - path: cmd/verify/main.go
      linters:
        - errcheck

linters-settings:
  goimports:
    local-prefixes: github.com/gmowses/fepublica
