version: 2

project_name: fepublica

before:
  hooks:
    - go mod tidy

builds:
  - id: collector
    main: ./cmd/collector
    binary: fepublica-collector
    env: [CGO_ENABLED=0]
    flags: [-trimpath]
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
    goos: [linux, darwin]
    goarch: [amd64, arm64]
  - id: anchor
    main: ./cmd/anchor
    binary: fepublica-anchor
    env: [CGO_ENABLED=0]
    flags: [-trimpath]
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
    goos: [linux, darwin]
    goarch: [amd64, arm64]
  - id: api
    main: ./cmd/api
    binary: fepublica-api
    env: [CGO_ENABLED=0]
    flags: [-trimpath]
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
    goos: [linux, darwin]
    goarch: [amd64, arm64]
  - id: verify
    main: ./cmd/verify
    binary: fepublica-verify
    env: [CGO_ENABLED=0]
    flags: [-trimpath]
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - id: server
    ids: [collector, anchor, api]
    name_template: >-
      {{ .ProjectName }}-server_{{ .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE
      - README.md
      - docs/**/*
  - id: verify
    ids: [verify]
    name_template: >-
      {{ .ProjectName }}-verify_{{ .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - docs/verification.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: gmowses
    name: fepublica
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
  header: |
    # Fé Pública {{ .Tag }}

    Arquivo imutável e criptograficamente verificável de dados públicos brasileiros.

    See the [design document](https://github.com/gmowses/fepublica/blob/main/docs/DESIGN.md) for architecture, and the [roadmap](https://github.com/gmowses/fepublica/blob/main/docs/ROADMAP.md) for what's planned next.
  footer: |
    ---

    ### Verifying the release

    Binaries are built reproducibly with `-trimpath` and stripped symbols. Check `checksums.txt` alongside the tarballs.

    Container images for this release are published to:

    - `ghcr.io/gmowses/fepublica-api:{{ .Tag }}`
    - `ghcr.io/gmowses/fepublica-collector:{{ .Tag }}`
    - `ghcr.io/gmowses/fepublica-anchor:{{ .Tag }}`

    Distributed under the [GNU AGPLv3](https://github.com/gmowses/fepublica/blob/main/LICENSE).
